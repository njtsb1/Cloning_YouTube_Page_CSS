<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clone YouTube - Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <div class="header-inner">
      <button id="menuBtn" class="icon-btn" aria-label="Open menu" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/>
        </svg>
      </button>

      <div class="brand" role="img" aria-label="Site logo">
        <strong class="brand-text" data-i18n="brand">YouTube Clone</strong>
      </div>

      <div class="search" role="search">
        <label for="searchInput" class="visually-hidden" data-i18n="searchLabel">Search</label>
        <input id="searchInput" type="search" placeholder="Search" aria-label="Search videos" />
        <button id="searchBtn" class="icon-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 20.49 21.49 19 15.5 14zM10 14a4 4 0 110-8 4 4 0 010 8z"/>
          </svg>
        </button>
      </div>

      <div class="header-actions">
        <div class="lang-select">
          <label for="lang" class="visually-hidden">Language</label>
          <select id="lang" aria-label="Select language">
            <option value="en-US">EN</option>
            <option value="pt-BR">PT</option>
            <option value="es-ES">ES</option>
          </select>
        </div>

        <button id="themeToggle" class="icon-btn" aria-pressed="false" aria-label="Toggle theme">
          <!-- icons injected by JS for accessibility -->
          <span id="themeIcon" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav id="sidebar" class="sidebar" aria-label="Main navigation">
      <ul>
        <li><a href="#" data-i18n="home">Home</a></li>
        <li><a href="#" data-i18n="explore">Explore</a></li>
        <li><a href="#" data-i18n="subscriptions">Subscriptions</a></li>
        <li><a href="#" data-i18n="library">Library</a></li>
      </ul>
    </nav>

    <main id="main" class="main" role="main">
      <section class="hero" aria-labelledby="heroTitle">
        <h1 id="heroTitle" class="hero-title" data-i18n="heroTitle">Featured Video</h1>

        <article class="video-card" aria-labelledby="videoTitle">
          <div class="video-frame" role="region" aria-label="Video player">
            <div class="responsive-iframe">
              <!-- Vídeo DIO incorporado -->
              <iframe width="560" height="315" src="https://www.youtube.com/embed/6d_3dbYUn3Q?si=1dSXx98sMOCUjPn-" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
          </div>

          <div class="video-meta">
            <h2 id="videoTitle" class="video-title">Competindo no Planeta das Startups Bilionárias - Documentário</h2>
            <p class="video-channel" data-i18n="channel">DIO - Digital Innovation One</p>
            <p class="video-desc" data-i18n="description">Documentary used for educational cloning exercise.</p>
          </div>
        </article>
      </section>

      <section class="grid-section" aria-labelledby="gridTitle">
        <h2 id="gridTitle" class="section-title" data-i18n="more">More Videos</h2>

        <div class="video-grid" id="videoGrid" aria-live="polite">
          <!-- Sample cards generated by JS for demo -->
        </div>
      </section>
    </main>
  </div>

  <footer class="site-footer" role="contentinfo">
    <p>&copy; <span id="year"></span> <span data-i18n="brand">YouTube Clone</span></p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
